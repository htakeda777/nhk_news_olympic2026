<!DOCTYPE html>
<html class="light" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ミラノ2026 パラリンピック 動画ニュース速報</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "navy": "#0a1a3c",
                        "ice-blue": "#f0f7ff",
                        "background-light": "#ffffff",
                        "border-light": "#e2e8f0",
                        "text-muted": "#64748b"
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="font-display overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col">
        <!-- Header -->
        <header class="flex flex-col items-center justify-center border-b border-slate-100 bg-white/80 backdrop-blur-md px-6 py-6 md:py-8 sticky top-0 z-[100]">
            <div class="flex flex-col items-center gap-3 text-primary w-full">
                <div class="size-12 mb-1">
                    <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z" fill="currentColor"></path>
                    </svg>
                </div>
                <h1 class="text-navy text-4xl md:text-6xl font-black leading-tight tracking-[0.1em] uppercase text-center">MILANO CORTINA 2026</h1>
                <p class="text-primary text-xs md:text-sm font-bold tracking-[0.5em] uppercase">Winter Paralympics News</p>
                <!-- Navigation Buttons -->
                <div class="flex items-center gap-2 mt-3">
                    <a href="index.html" class="px-4 py-1.5 rounded-full text-xs font-bold border border-primary text-primary hover:bg-primary hover:text-white transition-colors">オリンピック</a>
                    <span class="px-4 py-1.5 rounded-full text-xs font-bold bg-primary text-white shadow-md">パラリンピック</span>
                </div>
            </div>
            <!-- Date Navigation -->
            <div class="w-full max-w-[1200px] mt-4">
                <div class="flex items-center">
                    <button id="dateNavLeft" class="z-10 flex-shrink-0 size-8 flex items-center justify-center bg-ice-blue hover:bg-slate-100 text-navy rounded-lg transition-all border border-slate-200">
                        <span class="material-symbols-outlined text-xl">chevron_left</span>
                    </button>
                    <div id="dateNavScroll" class="flex-1 overflow-x-auto no-scrollbar mx-2 date-nav-mask">
                        <div id="dateNavContainer" class="flex items-center gap-2 py-1 px-4">
                            <!-- Date buttons will be dynamically generated -->
                        </div>
                    </div>
                    <button id="dateNavRight" class="z-10 flex-shrink-0 size-8 flex items-center justify-center bg-ice-blue hover:bg-slate-100 text-navy rounded-lg transition-all border border-slate-200">
                        <span class="material-symbols-outlined text-xl">chevron_right</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col w-full max-w-[1600px] mx-auto p-4 lg:p-8 gap-8">
            <!-- News Grid Section -->
            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-black tracking-tight text-navy flex items-center gap-3">
                        <span class="size-8 rounded-lg bg-ice-blue flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined text-xl">video_library</span>
                        </span>
                        ニュース速報
                    </h3>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="flex justify-center items-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
                </div>

                <!-- News Grid -->
                <div id="newsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
                    <!-- News cards will be dynamically generated -->
                </div>

                <!-- Load More Button -->
                <div id="loadMoreContainer" class="flex justify-center pt-8 hidden">
                    <button id="loadMoreBtn" class="px-12 py-4 bg-navy hover:bg-navy/90 text-white rounded-2xl text-xs font-black tracking-widest uppercase transition-all shadow-lg shadow-navy/20">
                        もっと見る
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-20 border-t border-slate-100 bg-ice-blue/30 py-8 px-6">
            <div class="max-w-[1600px] mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 text-[10px] font-black text-navy/40 uppercase tracking-widest">
                <p>&copy; 2026 International Paralympic Committee. MILANO CORTINA 2026.</p>
            </div>
        </footer>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="relative w-full max-w-5xl bg-navy rounded-2xl overflow-hidden shadow-2xl">
            <button id="closeModal" class="absolute top-4 right-4 z-10 size-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>
            <video id="modalVideo" class="w-full aspect-video" controls autoplay>
                <source src="" type="video/mp4">
            </video>
            <div class="p-6">
                <h3 id="modalTitle" class="text-white text-xl font-bold"></h3>
                <p id="modalDate" class="text-white/60 text-sm mt-2"></p>
            </div>
        </div>
    </div>

    <script>
        window.APP_CONFIG = { date_from: '2026-03-06', date_to: '2026-03-16' };
    </script>
    <script src="js/app.js"></script>
</body>
</html>
